# wasm threads (wasm-bindgen-rayon) require atomics + shared memory.
# These rustflags are scoped to the wasm32 target, so host `cargo test` is unaffected.
# NOTE: `-Z build-std=panic_abort,std` is passed on the `wasm-pack` command line
# (see build.sh) rather than here, so it doesn't force a std rebuild for host builds.
[target.wasm32-unknown-unknown]
rustflags = [
  "-C", "target-feature=+atomics,+bulk-memory",
  "-C", "link-arg=--shared-memory",
  "-C", "link-arg=--max-memory=1073741824",
  "-C", "link-arg=--import-memory",
  "-C", "link-arg=--export=__wasm_init_tls",
  "-C", "link-arg=--export=__tls_size",
  "-C", "link-arg=--export=__tls_align",
  "-C", "link-arg=--export=__tls_base",
]
